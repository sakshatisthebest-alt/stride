<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stride">
<meta name="theme-color" content="#080808">
<title>Stride</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#080808;--s1:#111;--s2:#181818;--s3:#222;--border:#2a2a2a;
  --text:#f0f0f0;--t2:#777;--t3:#3a3a3a;--acc:#c8f537;--red:#ff4545;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden;user-select:none;-webkit-user-select:none}

#app{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available;padding-top:var(--safe-t)}
.page{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none;padding-bottom:calc(72px + var(--safe-b));opacity:0;transition:opacity 0.18s}
.page.active{display:block;opacity:1}
#page-track{padding-bottom:0}
#page-track.active{display:flex;flex-direction:column}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:rgba(8,8,8,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:var(--safe-b);display:flex;padding-top:8px}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;border:none;background:none;color:var(--t3);font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:color 0.2s}
.nb svg{width:20px;height:20px;stroke-width:1.8;fill:none;stroke:currentColor}
.nb.active{color:var(--acc)}

/* MAP */
#map-wrap{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%;background:#0d0d0d}
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;z-index:400;pointer-events:none}
#stats-row{display:grid;grid-template-columns:repeat(4,1fr);background:linear-gradient(to bottom,rgba(8,8,8,0.97) 55%,transparent)}
.sc{display:flex;flex-direction:column;align-items:center;padding:16px 0 22px}
.sv{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--acc);letter-spacing:-0.02em;line-height:1}
.sl{font-size:9px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:0.1em;margin-top:3px}

/* GPS badge */
#gps-badge{position:absolute;top:14px;right:14px;z-index:401;background:rgba(8,8,8,0.85);border:1px solid var(--border);border-radius:100px;padding:5px 11px;display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:var(--t2);letter-spacing:0.06em}
#gps-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0}
#gps-dot.on{background:var(--acc);box-shadow:0 0 0 3px rgba(200,245,55,0.2);animation:gp 2s infinite}
#gps-dot.search{background:#ff8c42;animation:gp 0.8s infinite}
@keyframes gp{0%,100%{box-shadow:0 0 0 3px rgba(200,245,55,0.25)}50%{box-shadow:0 0 0 6px rgba(200,245,55,0.05)}}

/* Controls */
#ctrl{background:linear-gradient(to top,rgba(8,8,8,0.99) 75%,transparent);padding:16px 20px calc(80px + var(--safe-b) + 8px)}
#sess-lbl{text-align:center;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--t2);margin-bottom:14px;min-height:16px}
#sess-lbl span{color:var(--acc);font-family:'DM Mono',monospace}
.btns{display:flex;gap:14px;justify-content:center;align-items:center}
.btn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s;position:relative;overflow:hidden}
.btn:active{transform:scale(0.92)}
.btn svg{width:22px;height:22px;fill:none;stroke-width:2.2}
#btn-go{width:76px;height:76px;background:var(--acc);box-shadow:0 0 28px rgba(200,245,55,0.2)}
#btn-go svg{stroke:#000;fill:#000;width:26px;height:26px}
#btn-go.running::before{content:'';position:absolute;inset:-10px;border-radius:50%;border:2px solid var(--acc);animation:ring 2s infinite;opacity:0}
@keyframes ring{0%{transform:scale(0.85);opacity:0.7}100%{transform:scale(1.4);opacity:0}}
#btn-pause{background:var(--s2);border:1px solid var(--border)}
#btn-pause svg{stroke:var(--text)}
#btn-stop{background:rgba(255,69,69,0.1);border:1px solid rgba(255,69,69,0.25)}
#btn-stop svg{stroke:var(--red)}

/* loc dot on map */
.ld{width:14px;height:14px;border-radius:50%;background:var(--acc);box-shadow:0 0 0 3px rgba(200,245,55,0.3),0 0 0 7px rgba(200,245,55,0.08)}

/* COMMON */
.ph{padding:22px 18px 14px;display:flex;align-items:baseline;justify-content:space-between}
.pt{font-size:26px;font-weight:800;letter-spacing:-0.02em}
.ps{font-size:11px;color:var(--t2);font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:18px;margin:0 14px 10px}
.sec{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.1em;padding:0 18px 8px}

/* STATS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:0 14px 10px}
.scard{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:15px}
.sval{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;letter-spacing:-0.03em;line-height:1}
.sunit{font-size:12px;color:var(--t2)}
.slbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.08em;margin-top:5px}
.scard.hi .sval{color:var(--acc)}
.scard.hi{border-color:rgba(200,245,55,0.15);background:linear-gradient(135deg,#111800,#0d1100)}

/* week bars */
.wbars{display:flex;align-items:flex-end;gap:5px;height:70px;margin-top:14px}
.wb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.wbt{flex:1;width:100%;background:var(--s2);border-radius:5px;display:flex;align-items:flex-end;overflow:hidden}
.wbf{width:100%;background:var(--s3);border-radius:5px;transition:height 0.6s ease;min-height:0}
.wb.today .wbf{background:var(--acc)}
.wb.today .wbd{color:var(--acc)}
.wbd{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase}

/* pace chart */
.pchart{display:flex;align-items:flex-end;gap:4px;height:60px}
.pb{flex:1;background:rgba(200,245,55,0.12);border-radius:4px;min-height:3px;position:relative;cursor:pointer;transition:background 0.15s}
.pb:active{background:rgba(200,245,55,0.3)}
.pb-tip{position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:9px;color:var(--acc);white-space:nowrap;background:var(--s2);padding:2px 5px;border-radius:4px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.pb:active .pb-tip{opacity:1}

/* HISTORY */
.hi-item{background:var(--s1);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin:0 14px 10px;position:relative}
.hi-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--acc);border-radius:0 2px 2px 0;z-index:1}
.hi-body{padding:14px 14px 14px 20px}
.hi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.hi-date{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:0.08em}
.hi-dist{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:var(--acc);letter-spacing:-0.02em}
.hi-dist span{font-size:12px;color:var(--t2)}
.hi-meta{display:flex;gap:18px}
.hm{display:flex;flex-direction:column;gap:2px}
.hmv{font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.hml{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:0.08em}
.route-img{width:100%;height:110px;object-fit:cover;display:block;background:var(--s2)}
.route-canvas{width:100%;height:110px;display:block;background:var(--s2)}
.del-btn{float:right;background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;padding:0 0 4px 8px;line-height:1}
.del-btn:active{color:var(--red)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;color:var(--t3);gap:10px;text-align:center}
.empty svg{width:40px;height:40px;opacity:0.25}
.empty p{font-size:13px;font-weight:600;line-height:1.6}

/* TOAST */
#toast{position:fixed;top:calc(var(--safe-t)+14px);left:50%;transform:translateX(-50%) translateY(-14px);background:var(--s2);border:1px solid var(--border);color:var(--text);padding:9px 20px;border-radius:100px;font-size:12px;font-weight:700;z-index:9999;opacity:0;transition:all 0.25s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

<!-- ══ TRACK ══ -->
<div id="page-track" class="page active">
  <div id="map-wrap">
    <div id="map"></div>
    <div id="hud">
      <div id="stats-row">
        <div class="sc"><div class="sv" id="h-dist">0.00</div><div class="sl">KM</div></div>
        <div class="sc"><div class="sv" id="h-time">00:00</div><div class="sl">Time</div></div>
        <div class="sc"><div class="sv" id="h-pace">—</div><div class="sl">Pace</div></div>
        <div class="sc"><div class="sv" id="h-spd">0.0</div><div class="sl">km/h</div></div>
      </div>
    </div>
    <div id="gps-badge"><div id="gps-dot"></div><span id="gps-txt">GPS Off</span></div>
  </div>
  <div id="ctrl">
    <div id="sess-lbl">Ready to move</div>
    <div class="btns">
      <button class="btn" id="btn-pause" style="display:none" onclick="pauseRun()">
        <svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" fill="#f0f0f0" stroke="none"/><rect x="14" y="4" width="4" height="16" fill="#f0f0f0" stroke="none"/></svg>
      </button>
      <button class="btn" id="btn-go" onclick="startRun()">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
      <button class="btn" id="btn-stop" style="display:none" onclick="stopRun()">
        <svg viewBox="0 0 24 24" stroke="var(--red)"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ══ STATS ══ -->
<div id="page-stats" class="page">
  <div class="ph"><div class="pt">Stats</div><div class="ps" id="stats-date">—</div></div>

  <div class="card" style="background:linear-gradient(135deg,#111800,#0c1000);border-color:rgba(200,245,55,0.1)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-family:'DM Mono',monospace;font-size:52px;font-weight:500;color:var(--acc);letter-spacing:-0.04em;line-height:1" id="st-streak">0</div>
        <div style="font-size:11px;font-weight:700;color:var(--t2);letter-spacing:0.08em;text-transform:uppercase;margin-top:3px">Day streak 🔥</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:'DM Mono',monospace;font-size:22px;font-weight:500" id="st-totalkm">0.0</div>
        <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:0.06em">Total km</div>
      </div>
    </div>
    <div class="wbars" id="week-bars"></div>
  </div>

  <div class="sgrid">
    <div class="scard hi"><div class="sval"><span id="st-weekkm">0.0</span><span class="sunit"> km</span></div><div class="slbl">This week</div></div>
    <div class="scard"><div class="sval"><span id="st-runs">0</span></div><div class="slbl">Sessions</div></div>
    <div class="scard"><div class="sval"><span id="st-best">0.0</span><span class="sunit"> km</span></div><div class="slbl">Best run</div></div>
    <div class="scard"><div class="sval"><span id="st-avg">0.0</span><span class="sunit"> km</span></div><div class="slbl">Avg distance</div></div>
    <div class="scard"><div class="sval"><span id="st-avgpace">—</span></div><div class="slbl">Avg pace</div></div>
    <div class="scard"><div class="sval"><span id="st-days">0</span></div><div class="slbl">Active days</div></div>
  </div>

  <div class="sec">Pace trend — last 10 runs</div>
  <div class="card" style="padding:14px 12px 12px">
    <div class="pchart" id="pace-chart"></div>
    <div style="margin-top:8px;font-size:9px;color:var(--t3);text-align:center;letter-spacing:0.06em;text-transform:uppercase">min/km · tap bar for value · shorter = faster</div>
  </div>
  <div style="height:8px"></div>
</div>

<!-- ══ HISTORY ══ -->
<div id="page-history" class="page">
  <div class="ph"><div class="pt">History</div><div class="ps" id="hist-count">0 runs</div></div>
  <div id="hist-list"></div>
</div>

<!-- ══ NAV ══ -->
<nav id="nav">
  <button class="nb active" id="nb-track" onclick="go('track',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
    Track
  </button>
  <button class="nb" id="nb-stats" onclick="go('stats',this)">
    <svg viewBox="0 0 24 24"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
    Stats
  </button>
  <button class="nb" id="nb-history" onclick="go('history',this)">
    <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
    Log
  </button>
</nav>
</div>

<div id="toast"></div>

<script>
// ── DB ──────────────────────────────────────────────────────────
const DB={
  get(k,d=null){try{const v=localStorage.getItem('st_'+k);return v!==null?JSON.parse(v):d}catch{return d}},
  set(k,v){try{localStorage.setItem('st_'+k,JSON.stringify(v))}catch(e){toast('Storage full')}},
};

// ── STATE ───────────────────────────────────────────────────────
let map,routeLine,locMarker,watchId;
let running=false,paused=false,coords=[],startTime,elapsed=0,timerTick,curSpeed=0;

// ── MAP ─────────────────────────────────────────────────────────
function initMap(){
  map=L.map('map',{zoomControl:false,attributionControl:false,center:[20,0],zoom:2});
  L.tileLayer('https://cartodb-basemaps-{s}.global.ssl.fastly.net/dark_all/{z}/{x}/{y}.png',{
    subdomains:'abcd',maxZoom:19,crossOrigin:true
  }).addTo(map);
  routeLine=L.polyline([],{color:'#c8f537',weight:5,opacity:1,lineJoin:'round',lineCap:'round'}).addTo(map);
  locateMe();
}

function locateMe(){
  if(!navigator.geolocation){setGPS('off','No GPS');return}
  setGPS('search','Locating…');
  navigator.geolocation.getCurrentPosition(
    p=>{map.setView([p.coords.latitude,p.coords.longitude],16);putMarker(p.coords.latitude,p.coords.longitude);setGPS('on','Ready')},
    ()=>setGPS('off','GPS Off'),
    {enableHighAccuracy:true,timeout:12000,maximumAge:0}
  );
}

function setGPS(state,label){
  document.getElementById('gps-dot').className=state==='on'?'on':state==='search'?'search':'';
  document.getElementById('gps-txt').textContent=label;
}

function putMarker(lat,lng){
  if(locMarker)locMarker.setLatLng([lat,lng]);
  else locMarker=L.marker([lat,lng],{icon:L.divIcon({html:'<div class="ld"></div>',className:'',iconSize:[14,14],iconAnchor:[7,7]})}).addTo(map);
}

// ── RUN ─────────────────────────────────────────────────────────
function startRun(){
  if(!navigator.geolocation){toast('GPS unavailable');return}
  if(paused){resumeRun();return}
  setGPS('search','Acquiring…');
  document.getElementById('sess-lbl').textContent='Getting GPS fix…';
  navigator.geolocation.getCurrentPosition(p=>{
    running=true;paused=false;
    coords=[[p.coords.latitude,p.coords.longitude]];
    elapsed=0;startTime=Date.now();
    routeLine.setLatLngs(coords);
    map.setView([p.coords.latitude,p.coords.longitude],17);
    putMarker(p.coords.latitude,p.coords.longitude);
    show('btn-go',false);show('btn-pause',true);show('btn-stop',true);
    document.getElementById('btn-go').classList.add('running');
    document.getElementById('sess-lbl').innerHTML='<span>● REC</span> Running';
    setGPS('on','Tracking');
    timerTick=setInterval(tick,1000);
    watchId=navigator.geolocation.watchPosition(onPos,()=>setGPS('search','Weak GPS'),{enableHighAccuracy:true,maximumAge:0,timeout:15000});
  },err=>{
    setGPS('off','GPS Off');
    document.getElementById('sess-lbl').textContent='Ready to move';
    toast(err.code===1?'Allow location access':'GPS fix failed');
  },{enableHighAccuracy:true,timeout:15000,maximumAge:0});
}

function pauseRun(){
  paused=true;elapsed+=Date.now()-startTime;
  clearInterval(timerTick);if(watchId)navigator.geolocation.clearWatch(watchId);
  document.getElementById('btn-pause').innerHTML='<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="#f0f0f0" stroke="none"/></svg>';
  document.getElementById('sess-lbl').innerHTML='<span>⏸</span> Paused';
  setGPS('off','Paused');
}

function resumeRun(){
  paused=false;startTime=Date.now();
  document.getElementById('btn-pause').innerHTML='<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" fill="#f0f0f0" stroke="none"/><rect x="14" y="4" width="4" height="16" fill="#f0f0f0" stroke="none"/></svg>';
  document.getElementById('sess-lbl').innerHTML='<span>● REC</span> Running';
  setGPS('on','Tracking');
  timerTick=setInterval(tick,1000);
  watchId=navigator.geolocation.watchPosition(onPos,()=>setGPS('search','Weak GPS'),{enableHighAccuracy:true,maximumAge:0,timeout:15000});
}

function stopRun(){
  const total=elapsed+(paused?0:(Date.now()-startTime));
  running=false;paused=false;
  clearInterval(timerTick);if(watchId)navigator.geolocation.clearWatch(watchId);
  if(coords.length<2||total<4000){toast('Too short to save');resetUI();return}
  const dist=totalDist();
  const snap=makeSnap(coords);
  const session={id:Date.now(),date:new Date().toISOString(),coords,distance:dist,duration:total,pace:dist>0?(total/60000)/dist:0,snap};
  const sessions=DB.get('sessions',[]);
  sessions.unshift(session);
  if(sessions.length>60)sessions.pop();
  DB.set('sessions',sessions);
  toast(`Saved · ${dist.toFixed(2)} km`);
  resetUI();
}

function resetUI(){
  running=false;paused=false;elapsed=0;coords=[];
  clearInterval(timerTick);if(watchId)navigator.geolocation.clearWatch(watchId);
  routeLine.setLatLngs([]);
  show('btn-go',true);show('btn-pause',false);show('btn-stop',false);
  document.getElementById('btn-go').classList.remove('running');
  document.getElementById('btn-pause').innerHTML='<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" fill="#f0f0f0" stroke="none"/><rect x="14" y="4" width="4" height="16" fill="#f0f0f0" stroke="none"/></svg>';
  document.getElementById('sess-lbl').textContent='Ready to move';
  ['h-dist','h-pace','h-spd'].forEach(id=>document.getElementById(id).textContent=id==='h-dist'?'0.00':id==='h-spd'?'0.0':'—');
  document.getElementById('h-time').textContent='00:00';
  setGPS('off','GPS Off');
}

// ── GPS CALLBACK ────────────────────────────────────────────────
function onPos(p){
  const{latitude:lat,longitude:lng,speed:spd}=p.coords;
  setGPS('on','GPS');putMarker(lat,lng);
  if(running&&!paused){
    coords.push([lat,lng]);
    routeLine.setLatLngs(coords);
    map.panTo([lat,lng],{animate:true,duration:0.4});
    curSpeed=spd?spd*3.6:estSpd();
    updateHUD();
  }
}

// ── TIMER ───────────────────────────────────────────────────────
function tick(){
  const tot=elapsed+(Date.now()-startTime);
  const s=Math.floor(tot/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  document.getElementById('h-time').textContent=h>0?`${h}:${pad(m%60)}:${pad(s%60)}`:`${pad(m)}:${pad(s%60)}`;
  updateHUD();
}

function updateHUD(){
  const dist=totalDist(),tot=elapsed+(Date.now()-startTime);
  document.getElementById('h-dist').textContent=dist.toFixed(2);
  const pm=dist>0.01?(tot/60000)/dist:0;
  document.getElementById('h-pace').textContent=pm>0?`${Math.floor(pm)}:${pad(Math.round((pm%1)*60))}`:'—';
  document.getElementById('h-spd').textContent=curSpeed.toFixed(1);
}

// ── MATH ────────────────────────────────────────────────────────
function totalDist(){let d=0;for(let i=1;i<coords.length;i++)d+=hav(coords[i-1],coords[i]);return d}
function hav(a,b){const R=6371,dLa=(b[0]-a[0])*Math.PI/180,dLo=(b[1]-a[1])*Math.PI/180,x=Math.sin(dLa/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function estSpd(){if(coords.length<2)return 0;return hav(coords[coords.length-2],coords[coords.length-1])*3600}
function pad(n){return String(n).padStart(2,'0')}
function fmtDur(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);return h>0?`${h}h ${m%60}m`:`${m}m ${pad(s%60)}s`}
function fmtPace(p){return p>0?`${Math.floor(p)}:${pad(Math.round((p%1)*60))}`:'—'}

// ── ROUTE SNAPSHOT ──────────────────────────────────────────────
// Draws the GPS route onto a canvas and returns a base64 image.
// Saved locally in the session object — no internet needed to view it.
function makeSnap(pts){
  if(!pts||pts.length<2)return null;
  try{
    const W=600,H=220,PAD=30;
    const canvas=document.createElement('canvas');
    canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#0f0f0f';ctx.fillRect(0,0,W,H);

    let minLat=pts[0][0],maxLat=pts[0][0],minLng=pts[0][1],maxLng=pts[0][1];
    for(const p of pts){minLat=Math.min(minLat,p[0]);maxLat=Math.max(maxLat,p[0]);minLng=Math.min(minLng,p[1]);maxLng=Math.max(maxLng,p[1])}
    const lR=maxLat-minLat||0.0005,lnR=maxLng-minLng||0.0005;
    const sc=Math.min((W-PAD*2)/lnR,(H-PAD*2)/lR)*0.88;
    const ox=(W-lnR*sc)/2,oy=(H-lR*sc)/2;
    const tx=lng=>(lng-minLng)*sc+ox,ty=lat=>(maxLat-lat)*sc+oy;

    // faint grid dots
    ctx.fillStyle='rgba(255,255,255,0.03)';
    for(let x=20;x<W;x+=30)for(let y=20;y<H;y+=30){ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill()}

    // route glow
    ctx.shadowBlur=14;ctx.shadowColor='rgba(200,245,55,0.45)';
    ctx.strokeStyle='#c8f537';ctx.lineWidth=3;ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(tx(pts[0][1]),ty(pts[0][0]));
    for(let i=1;i<pts.length;i++)ctx.lineTo(tx(pts[i][1]),ty(pts[i][0]));
    ctx.stroke();

    // start dot (green)
    ctx.shadowBlur=10;ctx.shadowColor='rgba(200,245,55,0.8)';
    ctx.fillStyle='#c8f537';ctx.beginPath();ctx.arc(tx(pts[0][1]),ty(pts[0][0]),5,0,Math.PI*2);ctx.fill();
    // end dot (white)
    ctx.shadowColor='rgba(255,255,255,0.6)';
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(tx(pts[pts.length-1][1]),ty(pts[pts.length-1][0]),5,0,Math.PI*2);ctx.fill();

    return canvas.toDataURL('image/png',0.75);
  }catch{return null}
}

// ── STATS ───────────────────────────────────────────────────────
function renderStats(){
  const sessions=DB.get('sessions',[]);
  const now=new Date();
  const wStart=new Date(now);wStart.setDate(now.getDate()-now.getDay());wStart.setHours(0,0,0,0);
  let weekKm=0,totalKm=0,best=0,paceSum=0,paceN=0;
  const days=new Set(),wByDay=Array(7).fill(0);
  for(const s of sessions){
    const d=new Date(s.date);
    totalKm+=s.distance;if(s.distance>best)best=s.distance;
    days.add(d.toISOString().slice(0,10));
    if(s.pace>0){paceSum+=s.pace;paceN++}
    if(d>=wStart){weekKm+=s.distance;wByDay[d.getDay()]+=s.distance}
  }
  // streak
  let streak=0;
  for(let i=0;i<365;i++){
    const d=new Date(now);d.setDate(now.getDate()-i);
    if(sessions.some(s=>s.date.startsWith(d.toISOString().slice(0,10))))streak++;
    else if(i>0)break;
  }
  document.getElementById('st-streak').textContent=streak;
  document.getElementById('st-totalkm').textContent=totalKm.toFixed(1);
  document.getElementById('st-weekkm').textContent=weekKm.toFixed(1);
  document.getElementById('st-runs').textContent=sessions.length;
  document.getElementById('st-best').textContent=best.toFixed(1);
  document.getElementById('st-avg').textContent=sessions.length?(totalKm/sessions.length).toFixed(1):'0.0';
  document.getElementById('st-avgpace').textContent=paceN?fmtPace(paceSum/paceN):'—';
  document.getElementById('st-days').textContent=days.size;
  document.getElementById('stats-date').textContent=now.toLocaleDateString('en',{month:'short',day:'numeric'});

  // week bars
  const maxW=Math.max(...wByDay,0.1);
  const DN=['S','M','T','W','T','F','S'],tod=now.getDay();
  document.getElementById('week-bars').innerHTML=wByDay.map((v,i)=>`
    <div class="wb ${i===tod?'today':''}">
      <div class="wbt"><div class="wbf" style="height:${(v/maxW*100)}%"></div></div>
      <div class="wbd">${DN[i]}</div>
    </div>`).join('');

  // pace chart — last 10, shorter bar = faster (invert)
  const withP=sessions.filter(s=>s.pace>0).slice(0,10).reverse();
  if(withP.length){
    const maxP=Math.max(...withP.map(s=>s.pace));
    const minP=Math.min(...withP.map(s=>s.pace));
    const range=maxP-minP||1;
    document.getElementById('pace-chart').innerHTML=withP.map(s=>{
      // invert: fastest = tallest bar
      const h=Math.max(8,((maxP-s.pace)/range)*90+10);
      return `<div class="pb" style="height:${h}%"><div class="pb-tip">${fmtPace(s.pace)}</div></div>`;
    }).join('');
  } else {
    document.getElementById('pace-chart').innerHTML='<div style="color:var(--t3);font-size:11px;width:100%;text-align:center;padding-top:18px">No data yet</div>';
  }
}

// ── HISTORY ─────────────────────────────────────────────────────
function renderHistory(){
  const sessions=DB.get('sessions',[]);
  document.getElementById('hist-count').textContent=`${sessions.length} run${sessions.length!==1?'s':''}`;
  const list=document.getElementById('hist-list');
  if(!sessions.length){
    list.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg><p>No runs saved yet.<br>Hit Track and go!</p></div>`;
    return;
  }
  list.innerHTML=sessions.map(s=>{
    const d=new Date(s.date);
    const ds=d.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'});
    const imgHTML=s.snap
      ?`<img class="route-img" src="${s.snap}" alt="route"/>`
      :`<canvas class="route-canvas" id="rc-${s.id}"></canvas>`;
    return `<div class="hi-item">
      ${imgHTML}
      <div class="hi-body">
        <button class="del-btn" onclick="delRun(${s.id})">✕</button>
        <div class="hi-top">
          <div class="hi-date">${ds}</div>
          <div class="hi-dist">${s.distance.toFixed(2)}<span> km</span></div>
        </div>
        <div class="hi-meta">
          <div class="hm"><div class="hmv">${fmtDur(s.duration)}</div><div class="hml">Time</div></div>
          <div class="hm"><div class="hmv">${fmtPace(s.pace)} /km</div><div class="hml">Pace</div></div>
          <div class="hm"><div class="hmv">${(s.coords||[]).length}</div><div class="hml">GPS pts</div></div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Fallback: draw canvas for sessions without a saved image
  sessions.filter(s=>!s.snap&&s.coords&&s.coords.length>1).forEach(s=>{
    const c=document.getElementById('rc-'+s.id);
    if(c){c.width=c.offsetWidth||400;c.height=110;drawMini(c,s.coords)}
  });
}

function drawMini(canvas,pts){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
  let minLa=pts[0][0],maxLa=pts[0][0],minLo=pts[0][1],maxLo=pts[0][1];
  for(const p of pts){minLa=Math.min(minLa,p[0]);maxLa=Math.max(maxLa,p[0]);minLo=Math.min(minLo,p[1]);maxLo=Math.max(maxLo,p[1])}
  const lR=maxLa-minLa||0.0005,lnR=maxLo-minLo||0.0005,pd=14;
  const sc=Math.min((W-pd*2)/lnR,(H-pd*2)/lR)*0.85;
  const ox=(W-lnR*sc)/2,oy=(H-lR*sc)/2;
  const tx=lo=>(lo-minLo)*sc+ox,ty=la=>(maxLa-la)*sc+oy;
  ctx.shadowBlur=8;ctx.shadowColor='rgba(200,245,55,0.4)';
  ctx.strokeStyle='#c8f537';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(tx(pts[0][1]),ty(pts[0][0]));
  for(let i=1;i<pts.length;i++)ctx.lineTo(tx(pts[i][1]),ty(pts[i][0]));
  ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='#c8f537';ctx.beginPath();ctx.arc(tx(pts[0][1]),ty(pts[0][0]),4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(tx(pts[pts.length-1][1]),ty(pts[pts.length-1][0]),4,0,Math.PI*2);ctx.fill();
}

function delRun(id){
  DB.set('sessions',DB.get('sessions',[]).filter(s=>s.id!==id));
  renderHistory();renderStats();toast('Run deleted');
}

// ── NAV ─────────────────────────────────────────────────────────
function go(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='track')setTimeout(()=>map&&map.invalidateSize(),120);
  if(name==='stats')renderStats();
  if(name==='history')renderHistory();
}

function show(id,v){document.getElementById(id).style.display=v?'flex':'none'}
let toastT;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2800);
}

window.addEventListener('load',()=>{initMap();renderStats()});
</script>
